---
# RBAC for the kubernetes sandbox provider (on-demand runner Pods).
#
# Two ServiceAccounts with deliberately asymmetric rights (this file +
# serviceaccount-runner.yaml), plus the namespaced Role (role.yaml) and
# RoleBinding (rolebinding.yaml) that grant the server exactly what it needs to
# manage on-demand runner Pods — nothing more.
#
#   omnigent-server  — the Omnigent server runs as this SA (this overlay's
#                      deployment-patch.yaml sets serviceAccountName:
#                      omnigent-server). The sandbox launcher uses its in-cluster
#                      token to create/exec/delete runner Pods, so this SA is
#                      bound to the Role (see rolebinding.yaml).
#   omnigent-runner  — the sandbox runner Pods run as this SA; it has NO API
#                      rights (see serviceaccount-runner.yaml).
#
# Scope is a namespaced Role (NOT a ClusterRole): the server only ever manages
# Pods in its own namespace, so cluster-wide Pod rights would be needless blast
# radius. If you run the server in a different namespace from the runner Pods,
# move the Role + RoleBinding to the *runner* Pods' namespace and keep the
# RoleBinding subject pointing at the server SA in the server's namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnigent-server
  labels:
    app.kubernetes.io/name: omnigent
    app.kubernetes.io/component: server
