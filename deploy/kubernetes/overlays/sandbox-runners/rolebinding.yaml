---
# Binds the omnigent-sandbox-manager Role to the server SA. The runner SA is
# deliberately absent — runner Pods need no API access. (kustomize injects the
# subject namespace from the overlay's `namespace:`.)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: omnigent-sandbox-manager
  labels:
    app.kubernetes.io/name: omnigent
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: omnigent-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: omnigent-server
